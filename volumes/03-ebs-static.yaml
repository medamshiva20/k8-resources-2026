apiVersion: v1
kind: PersistentVolume 
metadata:
 name: ebs
spec:
 accessModes:
  - ReadWriteOnce
 capacity:
  storage: 2Gi 
 csi:
  driver: ebs.csi.aws.com
  fsType: ext4
  volumeHandle: vol-02f6d4e1cf91eb92b
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
 name: ebs-claim
spec:
 storageClassName: ""
 volumeName: ebs #This is the PV name
 accessModes:
  - ReadWriteOnce
 resources:
  requests:
   storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
 name: pod
spec:
 containers:
  - name: nginx 
    image: nginx
    volumeMounts:
     - name: html-data
       mountPath: /usr/share/nginx/html
 volumes:
  - name: html-data
    persistentVolumeClaim:
     claimName: ebs-claim
 nodeSelector:
  topology.kubernetes.io/zone: us-east-1d