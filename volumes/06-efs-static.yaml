apiVersion: v1
kind: PersistentVolume
metadata:
 name: efc-static-pv
spec:
 storageClassName: "" # sc should be empty for static provisioning
 accessModes:
  - ReadWriteMany
 volumeMode: Filesystem
 persistentVolumeReclaimPolicy: Retain
 capacity:
  storage: 5Gi
 csi:
  driver: efs.csi.aws.com
  fsType: efs
  volumeHandle: fs-08be3ce021b4e2788
---
apiVersion: v1
kind: PersistentVolumeClaim 
metadata: 
 name: efs-static-pvc
spec:
 storageClassName: ""
 volumeName: efs-static-pv
 accessModes:
  - ReadWriteMany
 resources:
  requests:
   storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
 name: app
spec:
 containers:
  - name: nginx 
    image: nginx 
    imagePullPolicy: Always
    resources:
     requests:
      cpu: "100m"
      memory: "64Mi"
     limits:
      cpu: "200m"
      memory: "128Mi"
    volumeMounts:
     - name: html-data
       mountPath: /usr/share/nginx/html
 volumes:
  - name: html-data
    persistentVolumeClaim:
     claimName: efs-static-pvc