apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-static
spec:
  storageClassName: "" # sc should be empty for static provisioning
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    fsType: efs
    volumeHandle: fs-02f245b7e14e836e2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-static
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: efs-static
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
 name: app
spec:
 containers:
  - name: nginx 
    image: nginx 
    volumeMounts:
     - name: html-data
       mountPath: /usr/share/nginx/html
 volumes:
  - name: html-data
    persistentVolumeClaim:
     claimName: efs-static