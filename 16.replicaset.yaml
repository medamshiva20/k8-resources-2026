apiVersion: apps/v1
kind: ReplicaSet
metadata:
 name: nginx-rs
 labels:
  project: roboshop
  purpose: rs-demo
  tier: frontend
  component: frontend
spec:
 replicas: 1
 selector:
  matchLabels:
   project: roboshop
   purpose: rs-demo
   tier: frontend
   component: frontend
 template:
  metadata:
   name: nginx-pod
   labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
  spec:
   containers:
    - name: nginx 
      image: nginx